<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reveal</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #0a0f1f, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* ✅ BIGGER + RESPONSIVE CONTAINER */
.container {
    text-align: center;
    width: min(90%, 800px);
    padding: 40px;
    animation: fadeIn 2s ease-in-out;
}

/* ✅ BIGGER RESPONSIVE LOGO */
img {
    width: min(70%, 350px);
    height: auto;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(0, 150, 255, 0.8);
    animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}

/* TEXT */
h1 {
    margin-top: 25px;
    font-size: clamp(22px, 3vw, 32px);
    letter-spacing: 2px;
    opacity: 0;
    animation: textAppear 2s ease forwards;
    animation-delay: 1.5s;
}

p {
    opacity: 0;
    animation: textAppear 2s ease forwards;
    animation-delay: 2.5s;
    color: #aaa;
    font-size: clamp(14px, 2vw, 18px);
}

/* ANIMATIONS */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes glow {
    from { box-shadow: 0 0 20px rgba(0,150,255,0.6); }
    to { box-shadow: 0 0 70px rgba(0,150,255,1); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes textAppear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<div class="container">
    <img src="Gemini_Generated_Image_cgfzflcgfzflcgfz(1).png" alt="AI Logo">
    <h1>FLUX AI SYSTEM</h1>
    <p>Initializing intelligent control...</p>
</div>

</body>
</html>
