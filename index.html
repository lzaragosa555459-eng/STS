<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reveal</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle, #0a0f1f, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    .container {
        text-align: center;
        animation: fadeIn 2s ease-in-out;
    }

    img {
        width: 200px;
        border-radius: 50%;
        box-shadow: 0 0 40px rgba(0, 150, 255, 0.8);
        animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
    }

    h1 {
        margin-top: 20px;
        font-size: 28px;
        letter-spacing: 2px;
        opacity: 0;
        animation: textAppear 2s ease forwards;
        animation-delay: 1.5s;
    }

    p {
        opacity: 0;
        animation: textAppear 2s ease forwards;
        animation-delay: 2.5s;
        color: #aaa;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @keyframes glow {
        from { box-shadow: 0 0 20px rgba(0,150,255,0.6); }
        to { box-shadow: 0 0 60px rgba(0,150,255,1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes textAppear {
        to { opacity: 1; transform: translateY(0); }
        from { opacity: 0; transform: translateY(20px); }
    }
</style>
</head>
<body>

<div class="container">
    <img src="Gemini_Generated_Image_cgfzflcgfzflcgfz(1).png" alt="AI Logo">
    <h1>FLUX AI SYSTEM</h1>
    <p>Initializing intelligent control...</p>
</div>

</body>
</html>
