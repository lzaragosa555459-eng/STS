<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Broadcast System</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: monospace;
    color: #00ff9f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* RESPONSIVE CONTAINER */
.broadcast {
    text-align: center;
    border: 2px solid #00ff9f;
    padding: 30px;
    
    /* responsive sizing */
    width: min(90%, 600px);
    
    box-shadow: 0 0 25px #00ff9f;
    background: rgba(0,0,0,0.8);
}

/* IMAGE RESPONSIVE TOO */
.broadcast img {
    width: min(60%, 250px);
    height: auto;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    border: 2px solid #00ff9f;
    margin-bottom: 20px;
}

/* AI text */
.message {
    font-size: clamp(14px, 2vw, 18px);
    margin-top: 10px;
    animation: fade 2s infinite;
}

@keyframes fade {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Label */
.label {
    color: red;
    font-size: clamp(12px, 1.5vw, 14px);
    margin-bottom: 10px;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="broadcast">

    <div class="label">⚠ AI BROADCAST SYSTEM ACTIVE ⚠</div>

    <img src="https://i.pravatar.cc/300?img=12" alt="John Bautista">

    <div class="message">
        🤖 AI Voice: "Don’t worry everyone! John Bautista is ok."
    </div>

</div>

</body>
</html>
