<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux AI Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    height:100vh;
    display:flex;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:270px;
    background:#111;
    border-right:1px solid #222;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:25px;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#00ff99;
}

.sidebar-btn{
    background:#1a1a1a;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.sidebar-btn:hover{
    background:#222;
}

.history{
    display:flex;
    flex-direction:column;
    gap:12px;
    font-size:14px;
    color:#aaa;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
}

.topbar{
    padding:20px 30px;
    border-bottom:1px solid #222;
    font-size:20px;
    font-weight:600;
}

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:40px 100px 140px;
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* WELCOME */
.welcome{
    text-align:center;
    margin-top:120px;
    opacity:.95;
}

.welcome-logo{
    font-size:70px;
    color:#00ff99;
    margin-bottom:15px;
}

.welcome h1{
    font-size:38px;
    font-weight:600;
}

/* MESSAGES */
.message{
    max-width:700px;
    padding:18px 22px;
    border-radius:18px;
    line-height:1.6;
    font-size:15px;
    animation:fadeIn .4s ease;
}

.user{
    align-self:flex-end;
    background:#1f1f1f;
}

.ai{
    align-self:flex-start;
    background:#121212;
    border:1px solid #222;
}

/* INPUT */
.input-area{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    display:flex;
    gap:10px;
    background:#181818;
    padding:15px;
    border-radius:18px;
    border:1px solid #2a2a2a;
}

.input-area input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
}

.send-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:14px;
    background:#00ff99;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.send-btn:hover{
    transform:scale(1.05);
}

.typing{
    color:#00ff99;
    font-style:italic;
    opacity:.8;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
.welcome-logo img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #00ff99;
}
/* TABLET */
@media (max-width: 992px){
    .sidebar{
        width:200px;
        padding:15px;
    }

    .chat-container{
        padding:30px 40px 120px;
    }

    .welcome h1{
        font-size:28px;
    }

    .welcome-logo img{
        width:90px;
        height:90px;
    }
}

/* PHONE */
@media (max-width: 768px){
    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        padding:12px 16px;
        gap:10px;
    }

    .history{
        display:none;
    }

    .sidebar-btn{
        padding:8px 12px;
        font-size:13px;
    }

    .logo{
        font-size:18px;
    }

    .topbar{
        padding:15px 20px;
        font-size:16px;
    }

    .chat-container{
        padding:20px 15px 120px;
    }

    .welcome{
        margin-top:60px;
    }

    .welcome h1{
        font-size:22px;
    }

    .welcome-logo img{
        width:70px;
        height:70px;
    }

    .message{
        max-width:100%;
        font-size:14px;
        padding:14px 16px;
    }

    .input-area{
        width:95%;
        bottom:15px;
        padding:10px;
    }

    .send-btn{
        width:42px;
        height:42px;
    }

    .input-area input{
        font-size:14px;
    }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <div class="welcome-logo">
            <img src="Gemini_Generated_Image_cgfzflcgfzflcgfz(1).png" alt="">
        </div>
        <p> FLUX AI</p>
       
        </div>

    <div class="sidebar-btn">+ New Session</div>

    <div class="history">
        <div>System Logs</div>
        <div>Threat Analysis</div>
        <div>Neural Records</div>
        <div>Protocol Access</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">Flux Artificial Intelligence</div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">
            <img src="Gemini_Generated_Image_cgfzflcgfzflcgfz(1).png" alt="">
        </div>
            <h1>How can Flux help you today?</h1>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message Flux AI...">
        <button class="send-btn" onclick="sendMessage()">➜</button>
    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const chat = document.getElementById("chatContainer");
    const welcome = document.getElementById("welcomeScreen");

    if(input.value.trim() === "") return;

    if(welcome) welcome.remove();

    // USER MESSAGE
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.textContent = input.value;
    chat.appendChild(userMsg);

    const userText = input.value;
    input.value = "";

    chat.scrollTop = chat.scrollHeight;

    // TYPING
    const typing = document.createElement("div");
    typing.className = "message ai typing";
    typing.textContent = "Flux AI is thinking...";
    chat.appendChild(typing);

    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        typing.remove();

        const aiMsg = document.createElement("div");
        aiMsg.className = "message ai";
        aiMsg.textContent = generateResponse(userText);
        chat.appendChild(aiMsg);

        chat.scrollTop = chat.scrollHeight;
    }, 1800);
}

function generateResponse(text){
    const responses = [
        "Science, Technology, and Society (STS) is an interdisciplinary field that examines how social, political, and cultural values affect scientific research and technological innovation, and how these, in turn, affect society. It explores the mutual shaping of science and technology, aiming to foster responsible innovation and understand the risks and benefits of advancement.",
        "Freudian id and ego, part of Sigmund Freud’s structural model of the psyche, represent distinct mental forces. The id is the unconscious, instinctive, and impulsive part seeking immediate gratification (pleasure principle). The ego is the rational, conscious part that mediates between the id's desires and reality. They work with the superego to shape personality. Verywell Mind"
    ];

    return responses[Math.floor(Math.random() * responses.length)];
}

document.getElementById("userInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
